  # Keep build strings out of this file so it remains linux-aarch64 friendly.
  - python=3.8.18
  - pip=24.3.1
  - opencv=4.6.0
  - pyyaml=6.0.2
  - tqdm=4.67.1
  - lz4=4.3.3
  - pip:
      - bag-convert==0.0.1
      - catkin-pkg==1.0.0
      - cffi==1.17.1
      - cyber-record==0.1.12
      - distro==1.9.0
      - docutils==0.20.1
      - gnupg==2.3.1
      - lzf==0.1
      - numpy==1.24.4
      - opencv-python==4.6.0
      - pillow==10.4.0
      - protobuf==3.19.4
      - psutil==7.0.0
      - py3rosmsgs==1.18.2
      - pycparser==2.22
      - pycryptodomex==3.22.0
      - pyparsing==3.1.4
      - python-dateutil==2.9.0.post0
      - record-msg==0.1.1
      - rospkg==1.6.0
      - six==1.17.0
